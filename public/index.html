<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Repo Manager</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>
          <svg width="28" height="28" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.25.25 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"
            />
          </svg>
          GitHub Repo Manager
        </h1>
        <div class="user-info" id="userInfo">Загрузка...</div>
      </div>

      <!-- Token Warning -->
      <div class="token-warning" id="tokenWarning"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <input
          type="text"
          class="search-box"
          id="search"
          placeholder="🔍 Поиск репозитория..."
        />
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="public">Публичные</button>
          <button class="filter-btn" data-filter="private">Скрытые</button>
        </div>
      </div>

      <!-- Action bar -->
      <div class="action-bar">
        <label class="select-all-label">
          <input type="checkbox" class="repo-checkbox" id="selectAll" />
          Выбрать все
        </label>
        <span class="selected-count" id="selectedCount">Выбрано: 0</span>
        <div class="spacer"></div>
        <button
          class="btn btn-all-private"
          id="btnAllPrivate"
          title="Сделать все репозитории скрытыми"
        >
          🔒 Все скрыть
        </button>
        <button
          class="btn btn-all-public"
          id="btnAllPublic"
          title="Сделать все репозитории публичными"
        >
          🔓 Все открыть
        </button>
        <button class="btn btn-private" id="btnMakePrivate" disabled>
          🔒 Скрыть выбранные
        </button>
        <button class="btn btn-public" id="btnMakePublic" disabled>
          🔓 Открыть выбранные
        </button>
        <button class="btn btn-delete" id="btnDelete" disabled>
          🗑️ Удалить выбранные
        </button>
      </div>

      <!-- Progress -->
      <div class="progress-container" id="progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Обработка...</div>
      </div>

      <!-- Stats -->
      <div class="stats" id="stats"></div>

      <!-- Repo list -->
      <div id="repoList" class="loading">
        <div class="spinner"></div>
        <div>Загрузка репозиториев...</div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="overlay" id="confirmModal">
      <div class="modal">
        <h3 id="modalTitle">Подтверждение</h3>
        <p id="modalDesc"></p>
        <ul id="modalList"></ul>
        <div id="modalExtra"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modalCancel">Отмена</button>
          <button class="btn" id="modalConfirm">Подтвердить</button>
        </div>
      </div>
    </div>

    <!-- Delete Modal -->
    <div class="overlay" id="deleteModal">
      <div class="modal">
        <h3 id="deleteTitle" style="color: var(--red)">
          🗑️ Удаление репозиториев
        </h3>
        <p class="delete-warning">
          ⚠️ Это действие необратимо! Все данные будут удалены навсегда.
        </p>
        <p id="deleteDesc"></p>
        <ul id="deleteList"></ul>
        <div id="deleteExtra"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="deleteCancel">Отмена</button>
          <button class="btn btn-delete-confirm" id="deleteConfirm" disabled>
            Удалить навсегда
          </button>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toasts"></div>

    <!-- JS-модули (порядок важен: зависимости загружаются первыми) -->
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/render.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
