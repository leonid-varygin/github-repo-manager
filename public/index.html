<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Repo Manager</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text-secondary: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --red: #f85149;
        --yellow: #d29922;
        --hover: #1c2128;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }

      .header h1 {
        font-size: 24px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header h1 svg {
        flex-shrink: 0;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-secondary);
        font-size: 14px;
      }

      .user-info img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        padding: 16px;
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .search-box {
        flex: 1;
        min-width: 200px;
        padding: 8px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 14px;
        outline: none;
      }

      .search-box:focus {
        border-color: var(--accent);
      }

      .search-box::placeholder {
        color: var(--text-secondary);
      }

      .filter-group {
        display: flex;
        gap: 4px;
        background: var(--bg);
        border-radius: 6px;
        padding: 2px;
      }

      .filter-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        background: transparent;
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover {
        color: var(--text);
      }
      .filter-btn.active {
        background: var(--border);
        color: var(--text);
      }

      /* Action bar */
      .action-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        padding: 12px 16px;
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .select-all-label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 14px;
        user-select: none;
      }

      .selected-count {
        color: var(--text-secondary);
        font-size: 14px;
      }

      .spacer {
        flex: 1;
      }

      .btn {
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-private {
        background: var(--red);
        color: #fff;
        border-color: var(--red);
      }

      .btn-private:hover:not(:disabled) {
        background: #da3633;
      }

      .btn-public {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }

      .btn-public:hover:not(:disabled) {
        background: #2ea043;
      }

      .btn-all-private {
        background: transparent;
        color: var(--red);
        border-color: var(--red);
      }

      .btn-all-private:hover:not(:disabled) {
        background: rgba(248, 81, 73, 0.1);
      }

      .btn-all-public {
        background: transparent;
        color: var(--green);
        border-color: var(--green);
      }

      .btn-all-public:hover:not(:disabled) {
        background: rgba(63, 185, 80, 0.1);
      }

      .btn-delete {
        background: transparent;
        color: var(--red);
        border-color: var(--red);
      }

      .btn-delete:hover:not(:disabled) {
        background: rgba(248, 81, 73, 0.1);
      }

      .btn-delete-confirm {
        background: var(--red);
        color: #fff;
        border-color: var(--red);
      }

      .btn-delete-confirm:hover:not(:disabled) {
        background: #da3633;
      }

      .delete-input {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        margin-top: 8px;
        font-family: monospace;
      }

      .delete-input:focus {
        border-color: var(--red);
      }

      .delete-input::placeholder {
        color: var(--text-secondary);
      }

      .delete-warning {
        color: var(--red);
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      /* Stats bar */
      .stats {
        display: flex;
        gap: 16px;
        margin-bottom: 16px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .stat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .stat-dot.public {
        background: var(--green);
      }
      .stat-dot.private {
        background: var(--yellow);
      }

      /* Repo list */
      .repo-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        width: 100%;
      }

      .repo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        transition: background 0.1s;
        cursor: pointer;
      }

      .repo-item:hover {
        background: var(--hover);
      }

      .repo-item + .repo-item {
        margin-top: -1px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      .repo-item:first-child {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      .repo-item:last-child {
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }
      .repo-item:only-child {
        border-radius: 6px;
      }

      .repo-checkbox {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
        cursor: pointer;
        flex-shrink: 0;
      }

      .repo-info {
        flex: 1;
        min-width: 0;
      }

      .repo-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--accent);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .repo-name:hover {
        text-decoration: underline;
      }

      .repo-desc {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 12px;
        font-weight: 500;
        flex-shrink: 0;
      }

      .badge-public {
        background: rgba(63, 185, 80, 0.15);
        color: var(--green);
        border: 1px solid rgba(63, 185, 80, 0.3);
      }

      .badge-private {
        background: rgba(210, 153, 34, 0.15);
        color: var(--yellow);
        border: 1px solid rgba(210, 153, 34, 0.3);
      }

      .repo-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .repo-lang {
        font-size: 12px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .lang-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      /* Loading */
      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 0;
        gap: 16px;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Overlay */
      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }

      .overlay.active {
        display: flex;
      }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        max-width: 480px;
        width: 90%;
      }

      .modal h3 {
        margin-bottom: 12px;
        font-size: 18px;
      }

      .modal p {
        color: var(--text-secondary);
        margin-bottom: 8px;
        font-size: 14px;
      }

      .modal ul {
        max-height: 200px;
        overflow-y: auto;
        margin-bottom: 16px;
        padding-left: 20px;
      }

      .modal ul li {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }

      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }

      .btn-cancel {
        background: transparent;
        color: var(--text-secondary);
        border-color: var(--border);
      }

      .btn-cancel:hover {
        background: var(--hover);
        color: var(--text);
      }

      /* Toast */
      .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 14px;
        animation: slideIn 0.3s ease;
        max-width: 400px;
      }

      .toast-success {
        background: #1a3a2a;
        border: 1px solid var(--green);
        color: var(--green);
      }
      .toast-error {
        background: #3a1a1a;
        border: 1px solid var(--red);
        color: var(--red);
      }
      .toast-info {
        background: #1a2a3a;
        border: 1px solid var(--accent);
        color: var(--accent);
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* Progress bar */
      .progress-container {
        display: none;
        margin-bottom: 16px;
      }

      .progress-container.active {
        display: block;
      }

      .progress-bar {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s;
        width: 0%;
      }

      .progress-text {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 4px;
      }

      /* Empty state */
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
      }

      .empty svg {
        margin-bottom: 16px;
      }

      /* Token warning */
      .token-warning {
        display: none;
        padding: 16px;
        margin-bottom: 16px;
        background: rgba(248, 81, 73, 0.1);
        border: 1px solid var(--red);
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.6;
      }

      .token-warning.active {
        display: block;
      }

      .token-warning strong {
        color: var(--red);
      }

      .token-warning code {
        background: var(--bg);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 13px;
      }

      .token-warning a {
        color: var(--accent);
        text-decoration: underline;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .toolbar {
          flex-direction: column;
        }
        .search-box {
          min-width: 100%;
        }
        .action-bar {
          flex-direction: column;
          align-items: stretch;
        }
        .spacer {
          display: none;
        }
        .header {
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }
        .repo-meta {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>
          <svg width="28" height="28" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.25.25 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"
            />
          </svg>
          GitHub Repo Manager
        </h1>
        <div class="user-info" id="userInfo">Загрузка...</div>
      </div>

      <!-- Token Warning -->
      <div class="token-warning" id="tokenWarning"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <input
          type="text"
          class="search-box"
          id="search"
          placeholder="🔍 Поиск репозитория..."
        />
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="public">Публичные</button>
          <button class="filter-btn" data-filter="private">Скрытые</button>
        </div>
      </div>

      <!-- Action bar -->
      <div class="action-bar">
        <label class="select-all-label">
          <input type="checkbox" class="repo-checkbox" id="selectAll" />
          Выбрать все
        </label>
        <span class="selected-count" id="selectedCount">Выбрано: 0</span>
        <div class="spacer"></div>
        <button
          class="btn btn-all-private"
          id="btnAllPrivate"
          title="Сделать все репозитории скрытыми"
        >
          🔒 Все скрыть
        </button>
        <button
          class="btn btn-all-public"
          id="btnAllPublic"
          title="Сделать все репозитории публичными"
        >
          🔓 Все открыть
        </button>
        <button class="btn btn-private" id="btnMakePrivate" disabled>
          🔒 Скрыть выбранные
        </button>
        <button class="btn btn-public" id="btnMakePublic" disabled>
          🔓 Открыть выбранные
        </button>
        <button class="btn btn-delete" id="btnDelete" disabled>
          🗑️ Удалить выбранные
        </button>
      </div>

      <!-- Progress -->
      <div class="progress-container" id="progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Обработка...</div>
      </div>

      <!-- Stats -->
      <div class="stats" id="stats"></div>

      <!-- Repo list -->
      <div id="repoList" class="loading">
        <div class="spinner"></div>
        <div>Загрузка репозиториев...</div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="overlay" id="confirmModal">
      <div class="modal">
        <h3 id="modalTitle">Подтверждение</h3>
        <p id="modalDesc"></p>
        <ul id="modalList"></ul>
        <div id="modalExtra"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modalCancel">Отмена</button>
          <button class="btn" id="modalConfirm">Подтвердить</button>
        </div>
      </div>
    </div>

    <!-- Delete Modal -->
    <div class="overlay" id="deleteModal">
      <div class="modal">
        <h3 id="deleteTitle" style="color: var(--red)">
          🗑️ Удаление репозиториев
        </h3>
        <p class="delete-warning">
          ⚠️ Это действие необратимо! Все данные будут удалены навсегда.
        </p>
        <p id="deleteDesc"></p>
        <ul id="deleteList"></ul>
        <div id="deleteExtra"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="deleteCancel">Отмена</button>
          <button class="btn btn-delete-confirm" id="deleteConfirm" disabled>
            Удалить навсегда
          </button>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toasts"></div>

    <script>
      // State
      let allRepos = [];
      let selectedRepos = new Set();
      let currentFilter = "all";
      let searchQuery = "";
      let isProcessing = false;

      // Language colors (common)
      const langColors = {
        JavaScript: "#f1e05a",
        TypeScript: "#3178c6",
        Python: "#3572A5",
        Java: "#b07219",
        "C++": "#f34b7d",
        C: "#555555",
        "C#": "#178600",
        Go: "#00ADD8",
        Rust: "#dea584",
        Ruby: "#701516",
        PHP: "#4F5D95",
        Swift: "#F05138",
        Kotlin: "#A97BFF",
        Dart: "#00B4AB",
        Shell: "#89e051",
        HTML: "#e34c26",
        CSS: "#563d7c",
        Vue: "#41b883",
        Svelte: "#ff3e00",
      };

      // DOM
      const $repoList = document.getElementById("repoList");
      const $selectAll = document.getElementById("selectAll");
      const $selectedCount = document.getElementById("selectedCount");
      const $search = document.getElementById("search");
      const $stats = document.getElementById("stats");
      const $progress = document.getElementById("progress");
      const $progressFill = document.getElementById("progressFill");
      const $progressText = document.getElementById("progressText");
      const $btnMakePrivate = document.getElementById("btnMakePrivate");
      const $btnMakePublic = document.getElementById("btnMakePublic");
      const $btnAllPrivate = document.getElementById("btnAllPrivate");
      const $btnAllPublic = document.getElementById("btnAllPublic");
      const $btnDelete = document.getElementById("btnDelete");

      // Init
      async function init() {
        try {
          const [userRes, reposRes] = await Promise.all([
            fetch("/api/user"),
            fetch("/api/repos"),
          ]);

          if (!userRes.ok || !reposRes.ok) throw new Error("API error");

          const user = await userRes.json();
          allRepos = await reposRes.json();

          document.getElementById("userInfo").innerHTML = `
          <img src="${user.avatar_url}" alt="${user.login}">
          <span><strong>${user.name || user.login}</strong> · ${user.public_repos} публичных · ${allRepos.length - user.public_repos} скрытых</span>
        `;

          // Check token scopes
          checkTokenScopes(user);

          render();
        } catch (err) {
          $repoList.innerHTML = `<div class="empty"><p>❌ Ошибка загрузки: ${err.message}</p><p style="margin-top:8px">Проверьте GITHUB_TOKEN в файле .env</p></div>`;
        }
      }

      function checkTokenScopes(user) {
        const scopes = user.tokenScopes || [];
        const warning = document.getElementById("tokenWarning");
        const missing = [];

        // Fine-grained tokens may not report scopes — skip check if empty and token looks fine-grained
        if (
          scopes.length === 0 &&
          user.tokenPreview &&
          !user.tokenPreview.startsWith("ghp_")
        ) {
          // Likely a fine-grained token — check if we can detect missing perms via errors instead
          return;
        }

        const hasRepo = scopes.some((s) => s === "repo" || s === "public_repo");

        const hasDelete = scopes.some((s) => s === "delete_repo");

        if (!hasRepo)
          missing.push(
            "<code>repo</code> — для смены видимости (публичный/скрытый)",
          );
        if (!hasDelete)
          missing.push("<code>delete_repo</code> — для удаления репозиториев");

        if (missing.length > 0) {
          warning.innerHTML = `
          <strong>⚠️ Недостаточно прав у токена (${user.tokenPreview || "токен"})</strong><br>
          Текущие права: ${scopes.length > 0 ? scopes.map((s) => "<code>" + s + "</code>").join(", ") : "не определены"}<br><br>
          Не хватает прав:<br>
          ${missing.map((m) => "• " + m).join("<br>")}<br><br>
          👉 <a href="https://github.com/settings/tokens" target="_blank">Пересоздайте токен</a> с нужными правами и обновите <code>.env</code>
        `;
          warning.classList.add("active");
        }
      }

      // Filter repos
      function getFilteredRepos() {
        return allRepos.filter((r) => {
          const matchFilter =
            currentFilter === "all" ||
            (currentFilter === "public" && !r.private) ||
            (currentFilter === "private" && r.private);
          const matchSearch =
            !searchQuery ||
            r.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
            (r.description &&
              r.description.toLowerCase().includes(searchQuery.toLowerCase()));
          return matchFilter && matchSearch;
        });
      }

      // Render
      function render() {
        const filtered = getFilteredRepos();
        const publicCount = allRepos.filter((r) => !r.private).length;
        const privateCount = allRepos.filter((r) => r.private).length;

        // Stats
        $stats.innerHTML = `
        <div class="stat"><span class="stat-dot public"></span> ${publicCount} публичных</div>
        <div class="stat"><span class="stat-dot private"></span> ${privateCount} скрытых</div>
        <div class="stat">Всего: ${allRepos.length}</div>
      `;

        if (filtered.length === 0) {
          $repoList.innerHTML = `<div class="empty">
          <svg width="48" height="48" viewBox="0 0 16 16" fill="var(--text-secondary)">
            <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.25.25 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"/>
          </svg>
          <p>Репозитории не найдены</p>
        </div>`;
          return;
        }

        $repoList.innerHTML =
          '<div class="repo-list">' +
          filtered
            .map((r) => {
              const checked = selectedRepos.has(r.full_name) ? "checked" : "";
              const color =
                r.language && langColors[r.language]
                  ? langColors[r.language]
                  : "#8b949e";
              return `
          <div class="repo-item" data-repo="${r.full_name}">
            <input type="checkbox" class="repo-checkbox" ${checked} data-repo="${r.full_name}">
            <div class="repo-info">
              <div>
                <a class="repo-name" href="${r.html_url}" target="_blank" onclick="event.stopPropagation()">
                  ${r.name}
                </a>
              </div>
              ${r.description ? `<div class="repo-desc">${escapeHtml(r.description)}</div>` : ""}
            </div>
            <div class="repo-meta">
              ${r.language ? `<span class="repo-lang"><span class="lang-dot" style="background:${color}"></span>${r.language}</span>` : ""}
              ${r.fork ? '<span class="badge" style="background:rgba(139,148,158,0.15);color:var(--text-secondary);border:1px solid rgba(139,148,158,0.3)">Форк</span>' : ""}
              <span class="badge ${r.private ? "badge-private" : "badge-public"}">${r.private ? "Скрытый" : "Публичный"}</span>
            </div>
          </div>
        `;
            })
            .join("") +
          "</div>";

        updateSelection();
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Selection
      function updateSelection() {
        const count = selectedRepos.size;
        $selectedCount.textContent = `Выбрано: ${count}`;
        $btnMakePrivate.disabled = count === 0 || isProcessing;
        $btnMakePublic.disabled = count === 0 || isProcessing;
        $btnAllPrivate.disabled = isProcessing;
        $btnAllPublic.disabled = isProcessing;
        $btnDelete.disabled = count === 0 || isProcessing;

        const filtered = getFilteredRepos();
        const allFilteredSelected =
          filtered.length > 0 &&
          filtered.every((r) => selectedRepos.has(r.full_name));
        $selectAll.checked = allFilteredSelected;
        $selectAll.indeterminate =
          !allFilteredSelected &&
          filtered.some((r) => selectedRepos.has(r.full_name));
      }

      // Toggle repo selection
      $repoList.addEventListener("click", (e) => {
        const item = e.target.closest(".repo-item");
        if (!item || e.target.tagName === "A") return;
        const fullName = item.dataset.repo;
        if (selectedRepos.has(fullName)) {
          selectedRepos.delete(fullName);
        } else {
          selectedRepos.add(fullName);
        }
        render();
      });

      // Select all
      $selectAll.addEventListener("change", () => {
        const filtered = getFilteredRepos();
        if ($selectAll.checked) {
          filtered.forEach((r) => selectedRepos.add(r.full_name));
        } else {
          filtered.forEach((r) => selectedRepos.delete(r.full_name));
        }
        render();
      });

      // Search
      $search.addEventListener("input", (e) => {
        searchQuery = e.target.value;
        render();
      });

      // Filters
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          render();
        });
      });

      // Translate API errors to friendly Russian messages
      function translateError(errMsg) {
        if (errMsg.includes("Public forks can't be made private")) {
          return "Публичные форки нельзя сделать скрытыми — это ограничение GitHub";
        }
        if (
          errMsg.includes("Resource not accessible by personal access token")
        ) {
          return "Недостаточно прав у токена (нужен scope: repo)";
        }
        if (errMsg.includes("Validation Failed")) {
          return "Ошибка валидации: " + errMsg;
        }
        if (errMsg.includes("Not Found")) {
          return "Репозиторий не найден";
        }
        return errMsg;
      }

      // Change visibility
      async function changeVisibility(repos, visibility) {
        if (repos.length === 0) return;

        const action = visibility === "private" ? "скрыть" : "открыть";
        const reposToChange = repos.map((r) => {
          const [owner, repo] = r.split("/");
          return { owner, repo };
        });

        // Show confirm modal
        const confirmed = await showModal(
          `${visibility === "private" ? "🔒" : "🔓"} ${reposToChange.length === 1 ? "Изменить видимость" : `Изменить видимость (${reposToChange.length} реп.)`}`,
          `Вы уверены, что хотите ${action} следующие репозитории?`,
          reposToChange.map((r) => r.repo),
          visibility === "private" ? "btn-private" : "btn-public",
        );

        if (!confirmed) return;

        isProcessing = true;
        $progress.classList.add("active");
        updateSelection();

        let processed = 0;
        let successCount = 0;
        let errorCount = 0;

        for (const { owner, repo } of reposToChange) {
          $progressFill.style.width = `${(processed / reposToChange.length) * 100}%`;
          $progressText.textContent = `${processed + 1} / ${reposToChange.length}: ${repo}`;

          try {
            const res = await fetch("/api/repos/visibility", {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ repos: [{ owner, repo }], visibility }),
            });
            const data = await res.json();

            if (data.successCount > 0) {
              successCount++;
              // Update local state
              const idx = allRepos.findIndex(
                (r) => r.full_name === `${owner}/${repo}`,
              );
              if (idx !== -1) allRepos[idx].private = visibility === "private";
            } else {
              errorCount++;
              const errMsg = data.results?.[0]?.error || "Неизвестная ошибка";
              const friendly = translateError(errMsg);
              showToast(`❌ ${repo}: ${friendly}`, "error");
            }
          } catch (err) {
            errorCount++;
            showToast(`❌ ${repo}: ${err.message}`, "error");
          }
          processed++;
        }

        $progressFill.style.width = "100%";
        $progressText.textContent =
          errorCount === 0 ? `Готово! ✅` : `Готово! ⚠️ ${errorCount} ошибок`;
        isProcessing = false;
        selectedRepos.clear();
        render();

        setTimeout(() => $progress.classList.remove("active"), 3000);

        if (errorCount === 0) {
          showToast(
            `✅ ${successCount} репозиториев ${visibility === "private" ? "скрыто" : "открыто"}`,
            "success",
          );
        } else if (successCount > 0) {
          showToast(
            `⚠️ ${successCount} успешно, ${errorCount} с ошибкой`,
            "error",
          );
        }
      }

      // Modal
      function showModal(title, desc, list, confirmClass) {
        return new Promise((resolve) => {
          const modal = document.getElementById("confirmModal");
          document.getElementById("modalTitle").textContent = title;
          document.getElementById("modalDesc").textContent = desc;
          document.getElementById("modalList").innerHTML = list
            .map((n) => `<li>${escapeHtml(n)}</li>`)
            .join("");

          const confirmBtn = document.getElementById("modalConfirm");
          confirmBtn.className = `btn ${confirmClass || ""}`;
          confirmBtn.textContent = "Подтвердить";

          modal.classList.add("active");

          const cleanup = () => {
            modal.classList.remove("active");
            confirmBtn.removeEventListener("click", onConfirm);
            document
              .getElementById("modalCancel")
              .removeEventListener("click", onCancel);
          };

          const onConfirm = () => {
            cleanup();
            resolve(true);
          };
          const onCancel = () => {
            cleanup();
            resolve(false);
          };

          confirmBtn.addEventListener("click", onConfirm);
          document
            .getElementById("modalCancel")
            .addEventListener("click", onCancel);
        });
      }

      // Toast
      function showToast(message, type = "info") {
        const container = document.getElementById("toasts");
        const toast = document.createElement("div");
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transition = "opacity 0.3s";
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }

      // Button handlers
      $btnMakePrivate.addEventListener("click", () => {
        const repos = [...selectedRepos];
        changeVisibility(repos, "private");
      });

      $btnMakePublic.addEventListener("click", () => {
        const repos = [...selectedRepos];
        changeVisibility(repos, "public");
      });

      $btnAllPrivate.addEventListener("click", () => {
        const repos = allRepos
          .filter((r) => !r.private)
          .map((r) => r.full_name);
        if (repos.length === 0) {
          showToast("Все репозитории уже скрыты", "info");
          return;
        }
        selectedRepos.clear();
        repos.forEach((r) => selectedRepos.add(r));
        changeVisibility(repos, "private");
      });

      $btnAllPublic.addEventListener("click", () => {
        const repos = allRepos.filter((r) => r.private).map((r) => r.full_name);
        if (repos.length === 0) {
          showToast("Все репозитории уже публичные", "info");
          return;
        }
        selectedRepos.clear();
        repos.forEach((r) => selectedRepos.add(r));
        changeVisibility(repos, "public");
      });

      // Delete repos
      async function deleteRepos(repos) {
        if (repos.length === 0) return;

        const reposToDelete = repos.map((r) => {
          const [owner, repo] = r.split("/");
          return { owner, repo };
        });

        const repoNames = reposToDelete.map((r) => r.repo);

        // Show delete modal
        const modal = document.getElementById("deleteModal");
        document.getElementById("deleteDesc").textContent =
          `Будет удалено ${repoNames.length} репозиториев:`;
        document.getElementById("deleteList").innerHTML = repoNames
          .map((n) => `<li style="color:var(--red)">${escapeHtml(n)}</li>`)
          .join("");

        const confirmPhrase =
          repoNames.length === 1 ? repoNames[0] : "удалить все";
        document.getElementById("deleteExtra").innerHTML = `
        <p style="margin-top:12px">Введите <strong style="color:var(--red)">${escapeHtml(confirmPhrase)}</strong> для подтверждения:</p>
        <input type="text" class="delete-input" id="deleteInput" placeholder="${confirmPhrase}" autocomplete="off">
      `;

        const confirmBtn = document.getElementById("deleteConfirm");
        confirmBtn.disabled = true;

        modal.classList.add("active");

        // Focus input
        setTimeout(() => document.getElementById("deleteInput")?.focus(), 100);

        // Wait for input
        const inputEl = document.getElementById("deleteInput");
        inputEl.addEventListener("input", () => {
          confirmBtn.disabled =
            inputEl.value.trim().toLowerCase() !== confirmPhrase.toLowerCase();
        });

        // Wait for confirmation
        const confirmed = await new Promise((resolve) => {
          const onConfirm = () => {
            cleanup();
            resolve(true);
          };
          const onCancel = () => {
            cleanup();
            resolve(false);
          };
          const onKeydown = (e) => {
            if (e.key === "Enter" && !confirmBtn.disabled) {
              cleanup();
              resolve(true);
            }
          };

          const cleanup = () => {
            modal.classList.remove("active");
            confirmBtn.removeEventListener("click", onConfirm);
            document
              .getElementById("deleteCancel")
              .removeEventListener("click", onCancel);
            inputEl.removeEventListener("keydown", onKeydown);
          };

          confirmBtn.addEventListener("click", onConfirm);
          document
            .getElementById("deleteCancel")
            .addEventListener("click", onCancel);
          inputEl.addEventListener("keydown", onKeydown);
        });

        if (!confirmed) return;

        isProcessing = true;
        $progress.classList.add("active");
        $progressFill.style.width = "0%";
        $progressFill.style.background = "var(--red)";
        updateSelection();

        let processed = 0;
        let successCount = 0;
        let errorCount = 0;

        for (const { owner, repo } of reposToDelete) {
          $progressFill.style.width = `${(processed / reposToDelete.length) * 100}%`;
          $progressText.textContent = `Удаление ${processed + 1} / ${reposToDelete.length}: ${repo}`;

          try {
            const res = await fetch("/api/repos/delete", {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ repos: [{ owner, repo }] }),
            });
            const data = await res.json();

            if (data.successCount > 0) {
              successCount++;
              // Remove from local state
              allRepos = allRepos.filter(
                (r) => r.full_name !== `${owner}/${repo}`,
              );
            } else {
              errorCount++;
            }
          } catch (err) {
            errorCount++;
          }
          processed++;
        }

        $progressFill.style.width = "100%";
        $progressText.textContent = `Готово! Удалено ${successCount} репозиториев`;
        $progressFill.style.background = "";
        isProcessing = false;
        selectedRepos.clear();
        render();

        setTimeout(() => {
          $progress.classList.remove("active");
          $progressFill.style.background = "";
        }, 3000);

        if (errorCount === 0) {
          showToast(`🗑️ ${successCount} репозиториев удалено`, "success");
        } else {
          showToast(
            `⚠️ ${successCount} удалено, ${errorCount} с ошибкой`,
            "error",
          );
        }
      }

      $btnDelete.addEventListener("click", () => {
        const repos = [...selectedRepos];
        deleteRepos(repos);
      });

      // Start
      init();
    </script>
  </body>
</html>
